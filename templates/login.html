<!DOCTYPE html>
<html>
<head>
<title>Support System Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-gradient-to-r from-blue-700 to-blue-500">

<!-- Login Card -->

<div class="bg-white shadow-2xl rounded-xl w-96 p-8">

<h2 class="text-2xl font-bold text-center text-gray-700 mb-6">
Support System Login
</h2>

<form action="/login_user" method="post" class="space-y-4">

<!-- Username -->

<div>
<label class="block text-gray-600 text-sm mb-1">Username</label>
<input 
type="text" 
name="username" 
placeholder="Enter username"
class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<!-- Password -->

<div>
<label class="block text-gray-600 text-sm mb-1">Password</label>
<input 
type="password" 
name="password" 
placeholder="Enter password"
class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<!-- Login Button -->

<button 
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition duration-200">

Login

</button>

</form>

<!-- Footer -->

<p class="text-center text-gray-500 text-sm mt-6">
© 2026 Support System
</p>

</div>

</body>
</html>
