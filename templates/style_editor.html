<!DOCTYPE html>
<html>

<head>
<title>Website Style Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->

<div class="bg-gray-900 text-white px-8 py-4 flex justify-between items-center">

<h2 class="text-xl font-semibold">
Website Style Editor
</h2>

<a href="/" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded">
Back to Home
</a>

</div>

<!-- Page Container -->

<div class="max-w-3xl mx-auto mt-12 bg-white shadow-lg rounded-lg p-8">

<h3 class="text-lg font-semibold text-gray-700 mb-6">
Customize Website Appearance
</h3>

<form action="/update_style" method="post" class="space-y-6">

<!-- Button Color -->

<div>

<label class="block text-gray-600 mb-2 font-medium">
Button Color
</label>

<input
type="text"
name="button_color"
value="{{ style.get('button_color','blue') }}"
placeholder="Enter color (e.g. blue, red, green)"
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>

<!-- Preview -->

<div>

<p class="text-gray-600 mb-2">Preview Button</p>

<button
type="button"
class="px-6 py-2 rounded text-white">
Preview
<button>sample button</button>
</button>

</div>

<!-- Submit -->

<button
type="submit"
class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded">

Update Style

</button>

</form>

</div>

</body>
</html>
