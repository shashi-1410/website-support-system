<!DOCTYPE html>
<html>

<head>
<title>Website Content Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->

<div class="bg-gray-900 text-white px-8 py-4 flex justify-between items-center">

<h2 class="text-xl font-semibold">
Website Content Editor
</h2>

<a href="/" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded">
Back to Website
</a>

</div>

<!-- Page Container -->

<div class="max-w-3xl mx-auto mt-12 bg-white shadow-lg rounded-lg p-8">

<h3 class="text-lg font-semibold text-gray-700 mb-6">
Edit Homepage Content
</h3>

<form action="/update_banner" method="post" class="space-y-6">

<!-- Banner Input -->

<div>

<label class="block text-gray-600 mb-2 font-medium">
Homepage Banner
</label>

<input
type="text"
name="banner"
value="{{ content.banner if content else 'Welcome' }}"
placeholder="Enter homepage banner text"
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>

<!-- Preview -->

<div>

<p class="text-gray-600 mb-2">Banner Preview</p>

<div class="bg-gray-100 border rounded-lg p-4 text-xl font-semibold text-gray-700">
{{ content.banner if content else "Welcome" }}
</div>

</div>

<!-- Submit -->

<button
type="submit"
class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded">

Update Banner

</button>

</form>

</div>

</body>

</html>
